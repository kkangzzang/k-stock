<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주식 현재가</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #stock-price {
            font-size: 1.5em;
            color: #333;
        }
    </style>
</head>

<body>
    <h1>삼성전자 현재가</h1>
    <div id="stock-price">불러오는 중...</div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const priceDiv = document.getElementById('stock-price');
            const ticker = 'AAPL'; // 삼성전자 (코스피)
            const apiKey = 'YY786LV9HS9X2WJQ'; // 발급받은 API 키 입력

            try {
                const response = await fetch(
                    `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${apiKey}`
                );
                const data = await response.json();
                const price = data['Global Quote']['05. price'];

                if (price) {
                    priceDiv.textContent = `삼성전자: ${parseFloat(price).toLocaleString()} KRW`;
                } else {
                    priceDiv.textContent = `${ticker}: 데이터 없음`;
                }
            } catch (error) {
                priceDiv.textContent = `${ticker}: 데이터 불러오기 오류`;
            }
        });
    </script>
</body>

</html>
