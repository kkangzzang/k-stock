<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주식 현재가</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #stock-price {
            font-size: 1.5em;
            color: #333;
        }
    </style>
</head>

<body>
    <h1>내 주식 현재가</h1>
    <div id="stock-price">불러오는 중...</div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const priceDiv = document.getElementById('stock-price');
            const ticker = '005930.KQ'; // 삼성전자 (코스닥/코스피에 따라 KQ 또는 KS)

            try {
                // 프록시 서버를 통해 Yahoo Finance API 호출
                const response = await fetch(
                    `https://api.allorigins.win/get?url=${encodeURIComponent(
                        'https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + ticker
                    )}`
                );
                const data = await response.json();
                const parsed = JSON.parse(data.contents);

                if (parsed.quoteResponse.result.length > 0) {
                    const price = parsed.quoteResponse.result[0].regularMarketPrice;
                    priceDiv.textContent = `삼성전자: ${price} KRW`;
                } else {
                    priceDiv.textContent = `${ticker}: 데이터 없음`;
                }
            } catch (error) {
                priceDiv.textContent = `${ticker}: 데이터 불러오기 오류`;
            }
        });
    </script>
</body>

</html>
